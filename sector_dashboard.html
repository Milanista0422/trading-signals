<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Sector ETF Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:12px}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:12px}
header h1{font-size:15px;font-weight:700}
.meta{color:#8b949e;font-size:11px}
.periods{display:flex;gap:4px;flex-wrap:wrap}
.period-btn{padding:4px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e;font-size:11px;cursor:pointer;transition:all .15s}
.period-btn.active,.period-btn:hover{background:#1f6feb;border-color:#1f6feb;color:#fff}
.chart-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px;margin-bottom:12px}
.chart-card h2{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.chart-wrap{position:relative;height:300px}
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px}
.sector-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;cursor:pointer;transition:border-color .15s}
.sector-card:hover{border-color:#58a6ff}
.sector-card.active{border-color:#58a6ff;background:#1a2332}
.sc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.sc-ticker{font-size:12px;font-weight:700;color:#58a6ff}
.sc-name{font-size:10px;color:#8b949e;margin-top:1px}
.sc-pct{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.sc-price{font-size:11px;color:#8b949e;font-variant-numeric:tabular-nums}
.pos{color:#3fb950}.neg{color:#f85149}.neu{color:#8b949e}
.sc-spark{height:36px;margin-top:6px}
.loading{text-align:center;padding:40px;color:#8b949e;font-size:12px}
.error-box{background:#2d1f1f;border:1px solid #b91c1c;border-radius:6px;padding:10px 14px;font-size:11px;color:#f87171;margin-bottom:12px}
.refresh-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:#8b949e}
.refresh-dot{width:6px;height:6px;border-radius:50%;background:#3fb950;display:inline-block}
.refresh-dot.loading{background:#f0883e;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.legend-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#8b949e;cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid transparent}
.legend-item:hover{border-color:#30363d}
.legend-item.hidden{opacity:.35}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sort-bar{display:flex;gap:4px;margin-bottom:8px;align-items:center;font-size:11px;color:#8b949e}
.sort-btn{padding:2px 8px;background:#21262d;border:1px solid #30363d;border-radius:3px;font-size:10px;cursor:pointer;color:#8b949e}
.sort-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.disclaimer{font-size:10px;color:#484f58;text-align:center;padding:8px;line-height:1.6}
</style>
</head>
<body>

<header>
  <div>
    <h1>🇺🇸 US Sector ETF Dashboard</h1>
    <div class="meta" id="last-update">読み込み中...</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <div class="refresh-bar">
      <span class="refresh-dot" id="refresh-dot"></span>
      <span id="refresh-label">更新中</span>
    </div>
    <div class="periods" id="period-btns">
      <button class="period-btn" data-range="1mo">1M</button>
      <button class="period-btn" data-range="3mo">3M</button>
      <button class="period-btn active" data-range="6mo">6M</button>
      <button class="period-btn" data-range="ytd">YTD</button>
      <button class="period-btn" data-range="1y">1Y</button>
    </div>
    <button class="period-btn" id="refresh-btn" onclick="loadAll()">⟳ 更新</button>
  </div>
</header>

<div id="error-area"></div>

<div class="chart-card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2>正規化パフォーマンス比較（期間開始=100）</h2>
    <div style="font-size:10px;color:#8b949e">クリックで表示/非表示</div>
  </div>
  <div class="legend-wrap" id="legend"></div>
  <div class="chart-wrap">
    <canvas id="main-chart"></canvas>
    <div class="loading" id="chart-loading">データを取得中...</div>
  </div>
</div>

<div class="sort-bar">
  <span>並び替え:</span>
  <button class="sort-btn active" data-sort="perf">期間パフォーマンス</button>
  <button class="sort-btn" data-sort="price">現在価格</button>
  <button class="sort-btn" data-sort="ticker">ティッカー</button>
</div>

<div class="sector-grid" id="sector-grid">
  <div class="loading" style="grid-column:1/-1">データを取得中...</div>
</div>

<div class="disclaimer">
  ⚠️ データはYahoo Finance API経由で取得。遅延がある場合があります。投資判断はご自身でお行いください。
  このダッシュボードはページを開くたびに自動で最新データに更新されます。
</div>

<script>
const SECTORS = [
  {ticker:'SPY',  name:'S&P 500',          color:'#6366f1'},
  {ticker:'QQQ',  name:'Nasdaq 100',        color:'#8b5cf6'},
  {ticker:'XLK',  name:'テクノロジー',       color:'#3b82f6'},
  {ticker:'SOXX', name:'半導体',             color:'#06b6d4'},
  {ticker:'XLC',  name:'通信サービス',       color:'#10b981'},
  {ticker:'XLF',  name:'金融',              color:'#f59e0b'},
  {ticker:'XLE',  name:'エネルギー',         color:'#ef4444'},
  {ticker:'XLV',  name:'ヘルスケア',         color:'#ec4899'},
  {ticker:'XLY',  name:'一般消費財',         color:'#f97316'},
  {ticker:'XLP',  name:'生活必需品',         color:'#84cc16'},
  {ticker:'XLI',  name:'資本財',            color:'#a78bfa'},
  {ticker:'ARKK', name:'イノベーション',     color:'#d946ef'},
];

const PROXY = 'https://corsproxy.io/?';
let currentRange = '6mo';
let allData = {};
let mainChart = null;
let hiddenSectors = new Set();
let sortMode = 'perf';
let refreshTimer = null;

async function fetchYahoo(ticker, range) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=${range}&events=div`;
  try {
    const r = await fetch(url, {headers:{'Accept':'application/json'}});
    if (!r.ok) throw new Error('direct failed');
    return await r.json();
  } catch {
    const r2 = await fetch(PROXY + encodeURIComponent(url));
    if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
    return await r2.json();
  }
}

function parseYahoo(json) {
  const result = json?.chart?.result?.[0];
  if (!result) throw new Error('No data');
  const ts = result.timestamp;
  const closes = result.indicators?.quote?.[0]?.close;
  const highs  = result.indicators?.quote?.[0]?.high;
  const lows   = result.indicators?.quote?.[0]?.low;
  const dates  = ts.map(t => {
    const d = new Date(t * 1000);
    return d.toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'});
  });
  const meta   = result.meta;
  return {dates, closes, highs, lows,
    currency: meta.currency,
    currentPrice: meta.regularMarketPrice,
    prevClose: meta.chartPreviousClose};
}

function normalize(closes) {
  const base = closes.find(v => v != null);
  if (!base) return closes;
  return closes.map(v => v == null ? null : (v / base) * 100);
}

function perfPct(closes) {
  const valid = closes.filter(v => v != null);
  if (valid.length < 2) return 0;
  return ((valid[valid.length-1] - valid[0]) / valid[0] * 100);
}

async function loadAll() {
  setRefreshing(true);
  document.getElementById('error-area').innerHTML = '';
  const errors = [];

  await Promise.allSettled(SECTORS.map(async s => {
    try {
      const json = await fetchYahoo(s.ticker, currentRange);
      allData[s.ticker] = parseYahoo(json);
    } catch(e) {
      errors.push(`${s.ticker}: ${e.message}`);
      allData[s.ticker] = null;
    }
  }));

  if (errors.length) {
    document.getElementById('error-area').innerHTML =
      `<div class="error-box">⚠️ 一部取得失敗: ${errors.join(' / ')}</div>`;
  }

  renderMainChart();
  renderCards();
  document.getElementById('last-update').textContent =
    '最終更新: ' + new Date().toLocaleString('ja-JP');
  setRefreshing(false);

  clearInterval(refreshTimer);
  refreshTimer = setInterval(loadAll, 5 * 60 * 1000);
  updateRefreshLabel();
}

function setRefreshing(on) {
  const dot = document.getElementById('refresh-dot');
  dot.className = 'refresh-dot' + (on ? ' loading' : '');
  document.getElementById('refresh-label').textContent = on ? '更新中' : '5分後に自動更新';
}

let nextRefresh = Date.now() + 5*60*1000;
function updateRefreshLabel() {
  nextRefresh = Date.now() + 5*60*1000;
  const iv = setInterval(() => {
    const sec = Math.max(0, Math.round((nextRefresh - Date.now()) / 1000));
    const m = Math.floor(sec/60), s = sec%60;
    const el = document.getElementById('refresh-label');
    if (el) el.textContent = `次回更新まで ${m}:${String(s).padStart(2,'0')}`;
    if (sec <= 0) clearInterval(iv);
  }, 1000);
}

function renderMainChart() {
  const chartLoading = document.getElementById('chart-loading');
  chartLoading.style.display = 'none';

  // Build common dates (use SPY or first available)
  const ref = SECTORS.find(s => allData[s.ticker])?.ticker;
  if (!ref) return;
  const dates = allData[ref].dates;

  const datasets = SECTORS.filter(s => allData[s.ticker]).map(s => {
    const d = allData[s.ticker];
    return {
      label: s.ticker,
      data: normalize(d.closes),
      borderColor: s.color,
      backgroundColor: s.color + '18',
      borderWidth: 1.5,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.2,
      hidden: hiddenSectors.has(s.ticker),
    };
  });

  if (mainChart) { mainChart.destroy(); mainChart = null; }

  const ctx = document.getElementById('main-chart').getContext('2d');
  mainChart = new Chart(ctx, {
    type: 'line',
    data: {labels: dates, datasets},
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: {mode:'index', intersect:false},
      plugins: {
        legend: {display:false},
        tooltip: {
          backgroundColor:'#161b22',
          borderColor:'#30363d',
          borderWidth:1,
          titleColor:'#8b949e',
          bodyColor:'#e6edf3',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)}`
          }
        }
      },
      scales: {
        x: {
          grid:{color:'#21262d'},
          ticks:{color:'#8b949e', font:{size:10},
            maxTicksLimit:8,
            maxRotation:0},
        },
        y: {
          grid:{color:'#21262d'},
          ticks:{color:'#8b949e', font:{size:10},
            callback: v => v.toFixed(0)},
        }
      }
    }
  });

  renderLegend();
}

function renderLegend() {
  const wrap = document.getElementById('legend');
  wrap.innerHTML = SECTORS.filter(s => allData[s.ticker]).map(s => `
    <div class="legend-item ${hiddenSectors.has(s.ticker)?'hidden':''}" onclick="toggleSector('${s.ticker}')">
      <span class="legend-dot" style="background:${s.color}"></span>
      ${s.ticker}
    </div>`).join('');
}

function toggleSector(ticker) {
  if (hiddenSectors.has(ticker)) hiddenSectors.delete(ticker);
  else hiddenSectors.add(ticker);
  if (mainChart) {
    const idx = mainChart.data.datasets.findIndex(d => d.label === ticker);
    if (idx >= 0) {
      mainChart.data.datasets[idx].hidden = hiddenSectors.has(ticker);
      mainChart.update();
    }
  }
  renderLegend();
}

function renderCards() {
  const grid = document.getElementById('sector-grid');
  const entries = SECTORS
    .filter(s => allData[s.ticker])
    .map(s => ({s, d:allData[s.ticker], perf:perfPct(allData[s.ticker].closes)}));

  if (sortMode === 'perf') entries.sort((a,b) => b.perf - a.perf);
  else if (sortMode === 'price') entries.sort((a,b) => b.d.currentPrice - a.d.currentPrice);
  else entries.sort((a,b) => a.s.ticker.localeCompare(b.s.ticker));

  grid.innerHTML = entries.map(({s,d,perf}) => {
    const cls = perf>0?'pos':perf<0?'neg':'neu';
    const sign = perf>0?'+':'';
    const dayChg = d.currentPrice && d.prevClose
      ? ((d.currentPrice - d.prevClose)/d.prevClose*100).toFixed(2) : null;
    const dayCls = dayChg>0?'pos':dayChg<0?'neg':'neu';
    const daySign = dayChg>0?'+':'';
    return `
    <div class="sector-card ${hiddenSectors.has(s.ticker)?'':'active'}" onclick="toggleSector('${s.ticker}')">
      <div class="sc-header">
        <div>
          <div class="sc-ticker">${s.ticker}</div>
          <div class="sc-name">${s.name}</div>
        </div>
        <div style="text-align:right">
          <div class="sc-pct ${cls}">${sign}${perf.toFixed(1)}%</div>
          <div class="sc-price">${d.currency==='JPY'?'¥':'$'}${d.currentPrice?.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})??'—'}</div>
        </div>
      </div>
      ${dayChg!=null?`<div style="font-size:10px;color:var(--day)" class="${dayCls}">前日比 ${daySign}${dayChg}%</div>`:''}
      <canvas class="sc-spark" id="spark-${s.ticker}"></canvas>
    </div>`;
  }).join('');

  // Draw sparklines
  entries.forEach(({s,d}) => {
    const el = document.getElementById(`spark-${s.ticker}`);
    if (!el) return;
    const ctx = el.getContext('2d');
    const closes = d.closes.filter(v=>v!=null);
    new Chart(ctx, {
      type:'line',
      data:{
        labels: closes.map((_,i)=>i),
        datasets:[{
          data: closes,
          borderColor: s.color,
          borderWidth:1.5,
          pointRadius:0,
          fill:true,
          backgroundColor: s.color+'18',
          tension:0.3
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{x:{display:false},y:{display:false}},
        animation:false,
      }
    });
  });
}

// Period buttons
document.querySelectorAll('[data-range]').forEach(btn => {
  if (!btn.id) btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn[data-range]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    allData = {};
    hiddenSectors.clear();
    loadAll();
  });
});

// Sort buttons
document.querySelectorAll('[data-sort]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    renderCards();
  });
});

// Initial load
loadAll();
</script>
</body>
</html>
