<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* === BASE === */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#0d1117;color:#e6edf3;font-size:13px;min-height:100vh}

/* === TAB NAV === */
#tab-nav{
  position:sticky;top:0;z-index:100;
  display:flex;gap:0;
  background:#0d1117;
  border-bottom:1px solid #30363d;
  padding:0 12px;
}
.tab-btn{
  padding:10px 18px;
  background:transparent;
  border:none;
  border-bottom:2px solid transparent;
  color:#8b949e;
  font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.tab-btn:hover{color:#e6edf3}
.tab-btn.active{color:#58a6ff;border-bottom-color:#58a6ff}

.tab-pane{padding:12px;display:none}
.tab-pane.active{display:block}

/* === SIGNALS TAB === */
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
       padding:10px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:12px}
header h1{font-size:15px;font-weight:700}
.updated{color:#8b949e;font-size:11px}
.summary{display:flex;gap:6px;flex-wrap:wrap}
.sum-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.sum-STRONG_BUY {background:#0d4429;color:#3fb950;border:1px solid #238636}
.sum-BUY        {background:#122d20;color:#56d364;border:1px solid #2ea043}
.sum-HOLD       {background:#21262d;color:#8b949e;border:1px solid #30363d}
.sum-SELL       {background:#2d1f1f;color:#f87171;border:1px solid #b91c1c}
.sum-STRONG_SELL{background:#3d1a1a;color:#ef4444;border:1px solid #dc2626}
section{margin-bottom:14px}
section h2{font-size:11px;font-weight:600;color:#8b949e;padding:4px 0 6px;
           border-bottom:1px solid #21262d;margin-bottom:6px;
           text-transform:uppercase;letter-spacing:.8px}
table{width:100%;border-collapse:collapse}
th{padding:6px 8px;text-align:left;font-size:10px;font-weight:600;color:#8b949e;
   text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #21262d;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid #161b22;vertical-align:middle}
tr:hover td{background:#161b22}
tr:last-child td{border-bottom:none}
.ticker{font-weight:700;font-size:12px;color:#58a6ff}
.name  {color:#8b949e;font-size:11px}
.price {font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.chg-pos{color:#3fb950;font-size:11px}
.chg-neg{color:#f85149;font-size:11px}
.chg-neu{color:#8b949e;font-size:11px}
.sig{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
.sig-STRONG_BUY {background:#0d4429;color:#3fb950;border:1px solid #238636}
.sig-BUY        {background:#122d20;color:#56d364;border:1px solid #2ea043}
.sig-HOLD       {background:#21262d;color:#8b949e;border:1px solid #30363d}
.sig-SELL       {background:#2d1f1f;color:#f87171;border:1px solid #b91c1c}
.sig-STRONG_SELL{background:#3d1a1a;color:#ef4444;border:1px solid #dc2626}
.sr-sup {color:#3fb950;font-size:11px;font-variant-numeric:tabular-nums}
.sr-res {color:#f85149;font-size:11px;font-variant-numeric:tabular-nums}
.sr-none{color:#484f58}
.rsi-val{font-variant-numeric:tabular-nums;font-size:12px;font-weight:600}
.rsi-ob{color:#f85149}.rsi-os{color:#3fb950}.rsi-neu{color:#e6edf3}
.bb-zone{font-size:10px;padding:1px 5px;border-radius:3px;white-space:nowrap}
.bb-ab{background:#2d1f1f;color:#f87171}.bb-uh{background:#1f2a1f;color:#56d364}
.bb-lh{background:#21262d;color:#8b949e}.bb-bl{background:#122d20;color:#3fb950}
.vol-hi {color:#f0883e;font-size:11px;font-weight:600}
.vol-nor{color:#8b949e;font-size:11px}
.reason{color:#8b949e;font-size:11px;max-width:190px}
.btn-sbi{display:inline-block;padding:4px 10px;background:#1f6feb;color:#fff;border:none;
         border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-sbi:hover{background:#388bfd}
.btn-sbi-off{display:inline-block;padding:4px 10px;background:#21262d;color:#484f58;
             border:1px solid #30363d;border-radius:4px;font-size:11px;white-space:nowrap}
.err-box{background:#2d1f1f;border:1px solid #b91c1c;border-radius:6px;
         padding:10px 14px;margin-top:10px;font-size:11px;color:#f87171}

/* === SECTOR TAB === */
.s-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
          padding:10px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:12px}
.s-header h1{font-size:15px;font-weight:700}
.meta{color:#8b949e;font-size:11px}
.periods{display:flex;gap:4px;flex-wrap:wrap}
.period-btn{padding:4px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;
            color:#8b949e;font-size:11px;cursor:pointer;transition:all .15s}
.period-btn.active,.period-btn:hover{background:#1f6feb;border-color:#1f6feb;color:#fff}
.chart-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px;margin-bottom:12px}
.chart-card h2{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.chart-wrap{position:relative;height:300px}
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px}
.sector-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;cursor:pointer;transition:border-color .15s}
.sector-card:hover{border-color:#58a6ff}
.sector-card.active{border-color:#58a6ff;background:#1a2332}
.sc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.sc-name-ja{font-size:14px;font-weight:700;color:#e6edf3;margin-bottom:3px;line-height:1.2}
.sc-ticker-sm{font-size:11px;font-weight:600;color:#58a6ff}
.sc-pct{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.sc-price{font-size:11px;color:#8b949e;font-variant-numeric:tabular-nums}
.pos{color:#3fb950}.neg{color:#f85149}.neu{color:#8b949e}
.sc-spark{height:36px;margin-top:6px}
.s-loading{text-align:center;padding:40px;color:#8b949e;font-size:12px}
.s-error{background:#2d1f1f;border:1px solid #b91c1c;border-radius:6px;padding:10px 14px;font-size:11px;color:#f87171;margin-bottom:12px}
.refresh-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:#8b949e}
.refresh-dot{width:6px;height:6px;border-radius:50%;background:#3fb950;display:inline-block}
.refresh-dot.spin{background:#f0883e;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.legend-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#8b949e;cursor:pointer;
             padding:2px 6px;border-radius:3px;border:1px solid transparent}
.legend-item:hover{border-color:#30363d}
.legend-item.hidden{opacity:.35}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sort-bar{display:flex;gap:4px;margin-bottom:8px;align-items:center;font-size:11px;color:#8b949e}
.sort-btn{padding:2px 8px;background:#21262d;border:1px solid #30363d;border-radius:3px;font-size:10px;cursor:pointer;color:#8b949e}
.sort-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.disclaimer{font-size:10px;color:#484f58;text-align:center;padding:8px;line-height:1.6}

/* === MOBILE === */
@media(max-width:480px){
  .tab-btn{padding:8px 12px;font-size:12py}
  th,td{padding:5px 4px;font-size:11px}
  .reason{max-width:100px}
  .btn-sbi,.btn-sbi-off{padding:3px 6px;font-size:10py}
  .sector-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

// =============================================
// TAB SWITCHING
// =============================================
let sectorReady = false;

function showTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'sector' && !sectorReady) {
    sectorReady = true;
    sectorLoadAll();
  }
}

function fmt(v, cur) {
  if (cur==='JPY') return v.toLocaleString('ja-JP')+'円';
  return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function rsiCls(v){return v>70?'rsi-ob':v<30?'rsi-os':'rsi-neu'}
function bbCls(z){const m={'BB上抜け':'bb-ab','BB上半':'bb-uh','BB下半':'bb-lh','BB下抜け':'bb-bl'};return m[z]|'bb-lh'}
function chgCls(v){return v>0?'chg-pos':v<0?'chg-neg':'chg-neu'}

function sigRow(r) {
  const canAct = r.signal !== 'HOLD';
  const btn = canAct
    ? `<button class="btn-sbi" onclick="openSBI('${r.ticker}','${r.sbi_url}')">SBI 発注 →</button>`
    : `<span class="btn-sbi-off">発注不要</span>`;
  const sup = r.support    ? `<span class="sr-sup">S ${fmt(r.support,r.currency)}</span>` : '<span class="sr-none">—</span>';
  const res = r.resistance ? `<span class="sr-res">R ${fmt(r.resistance,r.currency)}</span>` : '<span class="sr-none">—</span>';
  const chgSign = r.change_pct>0?'+':'';
  return `<tr>
    <td><div class="ticker">${r.ticker}</div><div class="name">${r.name}</div></td>
    <td><span class="price">${fmt(r.price,r.currency)}</span><br>
        <span class="${chgCls(r.change_pct)}">${chgSign}${r.change_pct}%</span></td>
    <td><span class="sig sig-${r.signal}">${SL[r.signal]||r.signal}</span></td>
    <td>${sup}<br>${res}</td>
    <td><span class="rsi-val ${rsiCls(r.rsi)}">${r.rsi}</span></td>
    <td><span class="bb-zone ${bbCls(r.bb_zone)}">${r.bb_zone}</span></td>
    <td><span class="${r.vol_ratio>=1.5?'vol-hi':'vol-nor'}">${r.vol_ratio}x</span></td>
    <td class="reason">${r.reason}</td>
    <td>${btn}</td>
  </tr>`;
}

const PROXY = 'https://corsproxy.io/?';
let sCurrentRange = '6mo';
let sAllData = {};
let sMainChart = null;
let sHidden = new Set();
let sSortMode = 'perf';
let sRefreshTimer = null;

async function sectorFetch(ticker, range) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=${range}&events=div`;
  try {
    const r = await fetch(url, {headers:{'Accept':'application/json'}});
    if (!r.ok) throw new Error('direct failed');
    return await r.json();
  } catch {
    const r2 = await fetch(PROXY + encodeURIComponent(url));
    if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
    return await r2.json();
  }
}

function sectorParse(json) {
  const result = json?.chart?.result?.[0];
  if (!result) throw new Error('No data');
  const ts = result.timestamp;
  const closes = result.indicators?.quote?.[0]?.close;
  const dates = ts.map(t => {
    const d = new Date(t * 1000);
    return d.toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'});
  });
  const meta = result.meta;
  return {dates, closes,
    currency: meta.currency,
    currentPrice: meta.regularMarketPrice,
    prevClose: meta.chartPreviousClose};
}

function sNormalize(closes) {
  const base = closes.find(v => v != null);
  if (!base) return closes;
  return closes.map(v => v == null ? null : (v / base) * 100);
}

function sPerfPct(closes) {
  const valid = closes.filter(v => v != null);
  if (valid.length < 2) return 0;
  return ((valid[valid.length-1] - valid[0]) / valid[0] * 100);
}

async function sectorLoadAll() {
  sSetRefreshing(true);
  document.getElementById('error-area').innerHTML = '';
  const errors = [];

  await Promise.allSettled(SECTORS.map(async s => {
    try {
      const json = await sectorFetch(s.ticker, sCurrentRange);
      sAllData[s.ticker] = sectorParse(json);
    } catch(e) {
      errors.push(`${s.ticker}: ${e.message}`);
      sAllData[s.ticker] = null;
    }
  }));

  if (errors.length) {
    document.getElementById('error-area').innerHTML =
      `<div class="s-error">⚠️ 一部取得失敗: ${errors.join(' / ')}</div>`;
  }

  sRenderMainChart();
  sRenderCards();
  document.getElementById('last-update').textContent =
    '最終更新: ' + new Date().toLocaleString('ja-JP');
  sSetRefreshing(false);

  clearInterval(sRefreshTimer);
  sRefreshTimer = setInterval(sectorLoadAll, 5 * 60 * 1000);
  sUpdateRefreshLabel();
}

function sSetRefreshing(on) {
  const dot = document.getElementById('refresh-dot');
  dot.className = 'refresh-dot' + (on ? ' spin' : '');
  document.getElementById('refresh-label').textContent = on ? '更新中' : '5分後に自動更新';
}

let sNextRefresh = Date.now() + 5*60*1000;
function sUpdateRefreshLabel() {
  sNextRefresh = Date.now() + 5*60*1000;
  const iv = setInterval(() => {
    const sec = Math.max(0, Math.round((sNextRefresh - Date.now()) / 1000));
    const m = Math.floor(sec/60), s = sec%60;
    const el = document.getElementById('refresh-label');
    if (el) el.textContent = `次回更新まで ${m}:${String(s).padStart(2,'0')}`;
    if (sec <= 0) clearInterval(iv);
  }, 1000);
}

function sRenderMainChart() {
  const chartLoading = document.getElementById('chart-loading');
  if (chartLoading) chartLoading.style.display = 'none';

  const ref = SECTORS.find(s => sAllData[s.ticker])?.ticker;
  if (!ref) return;
  const dates = sAllData[ref].dates;

  const datasets = SECTORS.filter(s => sAllData[s.ticker]).map(s => {
    const d = sAllData[s.ticker];
    return {
      label: s.ticker,
      data: sNormalize(d.closes),
      borderColor: s.color,
      backgroundColor: s.color + '18',
      borderWidth: 1.5,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.2,
      hidden: sHidden.has(s.ticker),
    };
  });

  if (sMainChart) { sMainChart.destroy(); sMainChart = null; }

  const ctx = document.getElementById('main-chart').getContext('2d');
  sMainChart = new Chart(ctx, {
    type: 'line',
    data: {labels: dates, datasets},
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: {mode:'index', intersect:false},
      plugins: {
        legend: {display:false},
        tooltip: {
          backgroundColor:'#161b22',
          borderColor:'#30363d',
          borderWidth:1,
          titleColor:'#8b949e',
          bodyColor:'#e6edf3',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)}`
          }
        }
      },
      scales: {
        x: {grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:10},maxTicksLimit:8,maxRotation:0}},
        y: {grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:10},callback: v => v.toFixed(0)}}
      }
    }
  });

  sRenderLegend();
}

function sRenderLegend() {
  const wrap = document.getElementById('legend');
  wrap.innerHTML = SECTORS.filter(s => sAllData[s.ticker]).map(s => `
    <div class="legend-item ${sHidden.has(s.ticker)?'hidden':''}" onclick="sToggle('${s.ticker}')">
      <span class="legend-dot" style="background:${s.color}"></span>
      ${s.ticker}
    </div>`).join('');
}

function sToggle(ticker) {
  if (sHidden.has(ticker)) sHidden.delete(ticker);
  else sHidden.add(ticker);
  if (sMainChart) {
    const idx = sMainChart.data.datasets.findIndex(d => d.label === ticker);
    if (idx >= 0) {
      sMainChart.data.datasets[idx].hidden = sHidden.has(ticker);
      sMainChart.update();
    }
  }
  sRenderLegend();
}

function sRenderCards() {
  const grid = document.getElementById('sector-grid');
  const entries = SECTORS
    .filter(s => sAllData[s.ticker])
    .map(s => ({s, d:sAllData[s.ticker], perf:sPerfPct(sAllData[s.ticker].closes)}));

  if (sSortMode === 'perf') entries.sort((a,b) => b.perf - a.perf);
  else if (sSortMode === 'price') entries.sort((a,b) => b.d.currentPrice - a.d.currentPrice);
  else entries.sort((a,b) => a.s.ticker.localeCompare(b.s.ticker));

  grid.innerHTML = entries.map(({s,d,perf}) => {
    const cls = perf>0?'pos':perf<0?'neg':'neu';
    const sign = perf>0?'+':'';
    const dayChg = d.currentPrice && d.prevClose
      ? ((d.currentPrice - d.prevClose)/d.prevClose*100).toFixed(2) : null;
    const dayCls = dayChg>0?'pos':dayChg<0?'neg':'neu';
    const daySign = dayChg>0?'+':'';
    return `
    <div class="sector-card ${sHidden.has(s.ticker)?'':'active'}" onclick="sToggle('${s.ticker}')">
      <div class="sc-header">
        <div>
          <div class="sc-name-ja">${s.jaName}</div>
          <div class="sc-ticker-sm">${s.ticker}</div>
        </div>
        <div style="text-align:right">
          <div class="sc-pct ${cls}">${sign}${perf.toFixed(1)}%</div>
          <div class="sc-price">${d.currency==='JPY'?'¥':'$'}${d.currentPrice?.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})??'—'}</div>
        </div>
      </div>
      ${dayChg!=null?`<div style="font-size:10px" class="${dayCls}">前日比 ${daySign}${dayChg}%</div>`:''}
      <canvas class="sc-spark" id="spark-${s.ticker}"></canvas>
    </div>`;
  }).join('');

  entries.forEach(({s,d}) => {
    const el = document.getElementById(`spark-${s.ticker}`);
    if (!el) return;
    const ctx = el.getContext('2d');
    const closes = d.closes.filter(v=>v!=null);
    new Chart(ctx, {
      type:'line',
      data:{
        labels: closes.map((_,i)=>i),
        datasets:[{
          data: closes,
          borderColor: s.color,
          borderWidth:1.5,
          pointRadius:0,
          fill:true,
          backgroundColor: s.color+'18',
          tension:0.3
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{x:{display:false},y:{display:false}},
        animation:false,
      }
    });
  });
}

// Period buttons
document.querySelectorAll('#period-btns [data-range]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#period-btns .period-btn[data-range]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    sCurrentRange = btn.dataset.range;
    sAllData = {};
    sHidden.clear();
    sectorLoadAll();
  });
});

// Sort buttons
document.querySelectorAll('[data-sort]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    sSortMode = btn.dataset.sort;
    sRenderCards();
  });
});
</script>
</body>
</html>
