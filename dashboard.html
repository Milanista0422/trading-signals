  return '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function rsiCls(v) { return v > 70 ? 'rsi-ob' : v < 30 ? 'rsi-os' : 'rsi-neu'; }
function bbCls(z)  { const m = {'BB上抜け':'bb-ab','BB上半':'bb-uh','BB下半':'bb-lh','BB下抜け':'bb-bl'}; return m[z] || 'bb-lh'; }
function chgCls(v) { return v > 0 ? 'chg-pos' : v < 0 ? 'chg-neg' : 'chg-neu'; }

function row(r) {
  const canAct = r.signal !== 'HOLD';
  const btn = canAct
    ? `<button class="btn-sbi" onclick="openSBI('${r.ticker}','${r.sbi_url||''}')">SBI 発注 →</button>`
    : `<span class="btn-sbi-off">発注不要</span>`;
  const sup = r.support    ? `<span class="sr-sup">S ${fmt(r.support,r.currency)}</span>` : '<span class="sr-none">—</span>';
  const res = r.resistance ? `<span class="sr-res">R ${fmt(r.resistance,r.currency)}</span>` : '<span class="sr-none">—</span>';
  const chgSign = r.change_pct > 0 ? '+' : '';
  const catalystTag = r.catalyst ? `<br><span class="catalyst">${r.catalyst}</span>` : '';
  return `<tr>
    <td><div class="ticker">${r.ticker}</div><div class="name">${r.name}</div>${catalystTag}</td>
    <td><span class="price">${fmt(r.price,r.currency)}</span><br>
        <span class="${chgCls(r.change_pct)}">${chgSign}${r.change_pct}%</span></td>
    <td><span class="sig sig-${r.signal}">${SL[r.signal]||r.signal}</span></td>
    <td>${sup}<br>${res}</td>
    <td><span class="rsi-val ${rsiCls(r.rsi)}">${r.rsi}</span></td>
    <td><span class="bb-zone ${bbCls(r.bb_zone)}">${r.bb_zone||'—'}</span></td>
    <td><span class="${r.vol_ratio>=1.5?'vol-hi':'vol-nor'}">${r.vol_ratio||'—'}x</span></td>
    <td class="reason">${r.reason||''}</td>
    <td>${btn}</td>
  </tr>`;
}

function openSBI(t, url) {
  if (confirm(t + ' の発注画面をSBI証券で開きます。\n最終的な発注はご自身でご確認くださざい。')) {
    if (url) window.open(url, '_blank');
  }
}

// Header
document.getElementById('upd').textContent = '最終更新: ' + DATA.updated_at;
const order = ['STRONG_BUY','BUY','HOLD','SELL','STRONG_SELL'];
document.getElementById('sum').innerHTML = order.map(s => {
  const c = (DATA.summary && DATA.summary[s]) || 0;
  if (!c) return '';
  return `<span class="sum-badge sum-${s}">${SL[s]}: ${c}</span>`;
}).join('');

// Body — render each group
const byTicker = {};
DATA.signals.forEach(r => byTicker[r.ticker] = r);

let html = '';
for (const [g, tickers] of Object.entries(GROUPS)) {
  const rows = tickers.filter(t => byTicker[t]).map(t => row(byTicker[t])).join('');
  if (!rows) continue;
  html += `<section><h2>${g}</h2><table>
    <thead><tr><th>銘柄</th><th>価格</th><th>シグナル</th><th>S/R</th>
    <th>RSI</th><th>BB位置</th><th>出来高比</th><th>根拠</th><th>発注</th></tr></thead>
    <tbody>${rows}</tbody></table></section>`;
}

// Show any tickers NOT in any group
const groupedTickers = new Set(Object.values(GROUPS).flat());
const ungrouped = DATA.signals.filter(r => !groupedTickers.has(r.ticker));
if (ungrouped.length) {
  html += `<section><h2>📌 その他</h2><table>
    <thead><tr><th>銘柄</th><th>価格</th><th>シグナル</th><th>S/R</th>
    <th>RSI</th><th>BB位置</th><th>出来高比</th><th>根拠</th><th>発注</th></tr></thead>
    <tbody>${ungrouped.map(row).join('')}</tbody></table></section>`;
}

if (DATA.errors && DATA.errors.length) {
  html += `<div class="err-box">⚠️ エラー: ${DATA.errors.join(', ')}</div>`;
}
document.getElementById('app').innerHTML = html;
</script>
</body>
</html>
