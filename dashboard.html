  const c = DATA.summary[s]||0; if (!c) return '';
  return `<span class="sum-badge sum-${s}">${SL[s]}: ${c}</span>`;
}).join('');

// Body
const byTicker = {};
DATA.signals.forEach(r => byTicker[r.ticker]=r);
let html = '';
for (const [g, tickers] of Object.entries(GROUPS)) {
  const rows = tickers.map(t => byTicker[t]?row(byTicker[t]):'').join('');
  if (!rows) continue;
  html += `<section><h2>${g}</h2><table>
    <thead><tr><th>銘柄</th><th>価格</th><th>シグナル</th><th>S/R</th>
    <th>RSI</th><th>BB位置</th><th>出来高比</th><th>根拠</th><th>発注</th></tr></thead>
    <tbody>${rows}</tbody></table></section>`;
}
if (DATA.errors && DATA.errors.length) {
  html += `<div class="err-box">⚠️ エラー: ${DATA.errors.join(', ')}</div>`;
}
document.getElementById('app').innerHTML = html;
</script>
</body>
</html>
